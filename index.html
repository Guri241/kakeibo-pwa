<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>家計簿</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #4f46e5; --primary-light: #818cf8; --bg: #f8fafc;
  --card: #fff; --text: #1e293b; --text-sub: #64748b; --border: #e2e8f0;
  --red: #ef4444; --green: #22c55e; --radius: 12px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding-bottom: calc(64px + var(--safe-bottom)); }
.header { background: var(--primary); color: #fff; padding: 16px 20px; font-size: 18px; font-weight: 700; position: sticky; top: 0; z-index: 10; }
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header .month-nav { display: flex; align-items: center; gap: 8px; }
.header .month-nav button { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 4px 8px; }
.header .month-label { font-size: 16px; min-width: 100px; text-align: center; }

.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--card);
  border-top: 1px solid var(--border); display: flex; z-index: 10;
  padding-bottom: var(--safe-bottom);
}
.tab-bar button {
  flex: 1; border: none; background: none; padding: 8px 4px 6px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 10px; color: var(--text-sub); transition: color .2s;
}
.tab-bar button.active { color: var(--primary); }
.tab-bar button svg { width: 24px; height: 24px; }

.page { display: none; padding: 16px; }
.page.active { display: block; }

.summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.summary-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.summary-card .label { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
.summary-card .amount { font-size: 20px; font-weight: 700; }
.summary-card .amount.income { color: var(--green); }
.summary-card .amount.expense { color: var(--red); }
.balance-card { grid-column: 1 / -1; }
.balance-card .amount { font-size: 24px; }

.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.card h3 { font-size: 14px; color: var(--text-sub); margin-bottom: 12px; }

.category-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.category-bar div { transition: width .3s; }
.category-list { display: flex; flex-direction: column; gap: 8px; }
.category-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
.category-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 16px; background: var(--card); color: var(--text); appearance: none;
}
.form-group textarea { resize: vertical; min-height: 60px; }
.type-toggle { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.type-toggle button { flex: 1; border: none; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--card); color: var(--text-sub); transition: all .2s; }
.type-toggle button.active-expense { background: var(--red); color: #fff; }
.type-toggle button.active-income { background: var(--green); color: #fff; }
.category-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.category-chips button {
  border: 1px solid var(--border); background: var(--card); border-radius: 20px;
  padding: 8px 14px; font-size: 13px; cursor: pointer; transition: all .2s; color: var(--text);
}
.category-chips button.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-submit {
  width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none;
  border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px;
}
.btn-submit:active { opacity: .8; }

.history-item {
  display: flex; justify-content: space-between; align-items: center; padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.history-item:last-child { border-bottom: none; }
.history-left { display: flex; flex-direction: column; gap: 2px; }
.history-cat { font-size: 13px; font-weight: 600; }
.history-memo { font-size: 12px; color: var(--text-sub); }
.history-date { font-size: 11px; color: var(--text-sub); }
.history-amount { font-weight: 700; font-size: 15px; }
.history-amount.income { color: var(--green); }
.history-amount.expense { color: var(--red); }
.history-actions { display: flex; gap: 4px; margin-left: 8px; }
.history-actions button { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; color: var(--text-sub); }

.filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
.filter-row button {
  white-space: nowrap; border: 1px solid var(--border); background: var(--card);
  border-radius: 20px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: var(--text);
}
.filter-row button.selected { background: var(--primary); color: #fff; border-color: var(--primary); }

.fixed-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.fixed-item:last-child { border-bottom: none; }
.btn-add { display: flex; align-items: center; gap: 4px; border: 1px dashed var(--border); background: none; padding: 10px; border-radius: 8px; width: 100%; justify-content: center; cursor: pointer; color: var(--text-sub); font-size: 14px; margin-top: 8px; }

.goal-progress { margin-top: 8px; }
.goal-bar-bg { height: 12px; background: var(--border); border-radius: 6px; overflow: hidden; }
.goal-bar-fill { height: 100%; background: var(--green); border-radius: 6px; transition: width .3s; }
.goal-text { display: flex; justify-content: space-between; font-size: 13px; margin-top: 4px; color: var(--text-sub); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 16px 16px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; padding-bottom: calc(20px + var(--safe-bottom)); }
.modal h3 { margin-bottom: 16px; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 16px; }
.modal .btn-row button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.modal .btn-cancel { background: var(--border); color: var(--text); }
.modal .btn-save { background: var(--primary); color: #fff; }
.modal .btn-delete { background: var(--red); color: #fff; }

.empty { text-align: center; color: var(--text-sub); padding: 40px 0; font-size: 14px; }

.setting-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
.setting-item:last-child { border-bottom: none; }
.setting-label { font-size: 14px; }
.setting-value { font-size: 13px; color: var(--text-sub); }
.btn-export { width: 100%; padding: 12px; border: 1px solid var(--primary); color: var(--primary); background: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <span>家計簿</span>
    <div class="month-nav">
      <button id="prevMonth">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button id="nextMonth">›</button>
    </div>
  </div>
</div>

<!-- ホーム -->
<div class="page active" id="pageHome">
  <div class="summary-cards">
    <div class="summary-card"><div class="label">収入</div><div class="amount income" id="totalIncome">¥0</div></div>
    <div class="summary-card"><div class="label">支出</div><div class="amount expense" id="totalExpense">¥0</div></div>
    <div class="summary-card"><div class="label">当月収支</div><div class="amount" id="totalBalance">¥0</div></div>
    <div class="summary-card"><div class="label">累計残高</div><div class="amount" id="totalCumulative">¥0</div></div>
  </div>
  <div class="card">
    <h3>カテゴリ別支出</h3>
    <div class="category-bar" id="categoryBar"></div>
    <div class="category-list" id="categoryList"></div>
  </div>
  <div class="card">
    <h3>最近の取引</h3>
    <div id="recentList"></div>
  </div>
</div>

<!-- 入力 -->
<div class="page" id="pageInput">
  <div class="card">
    <div class="form-group">
      <label>種類</label>
      <div class="type-toggle">
        <button class="active-expense" id="btnExpense" onclick="setType('expense')">支出</button>
        <button id="btnIncome" onclick="setType('income')">収入</button>
      </div>
    </div>
    <div class="form-group">
      <label>金額</label>
      <input type="number" id="inputAmount" placeholder="0" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>カテゴリ</label>
      <div class="category-chips" id="categoryChips"></div>
    </div>
    <div class="form-group">
      <label>日付</label>
      <input type="date" id="inputDate">
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="inputMemo" placeholder="任意"></textarea>
    </div>
    <button class="btn-submit" onclick="saveEntry()">保存</button>
  </div>
</div>

<!-- 履歴 -->
<div class="page" id="pageHistory">
  <div class="filter-row" id="filterRow"></div>
  <div class="card">
    <div id="historyList"></div>
  </div>
</div>

<!-- 固定費 -->
<div class="page" id="pageFixed">
  <div class="card">
    <h3>月額固定費</h3>
    <div id="fixedList"></div>
    <button class="btn-add" onclick="openFixedModal()">＋ 固定費を追加</button>
  </div>
  <div class="card" style="margin-top:12px">
    <h3>貯蓄目標</h3>
    <div id="goalSection"></div>
    <button class="btn-add" onclick="openGoalModal()">＋ 目標を設定</button>
  </div>
</div>

<!-- 設定 -->
<div class="page" id="pageSettings">
  <div class="card">
    <h3>初期残高設定</h3>
    <p style="font-size:13px;color:var(--text-sub);margin-bottom:12px">データ取込前（2025年12月末）の口座残高を入力してください。</p>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="number" id="initialBalance" inputmode="numeric" placeholder="0" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:16px">
      <button class="btn-submit" style="width:auto;padding:10px 16px;margin:0" onclick="saveInitialBalance()">保存</button>
    </div>
  </div>
  <div class="card">
    <h3>三菱UFJ CSV取込</h3>
    <p style="font-size:13px;color:var(--text-sub);margin-bottom:12px">三菱UFJダイレクトからダウンロードしたCSVを取り込みます。摘要内容からカテゴリを自動分類します。</p>
    <button class="btn-export" style="background:var(--primary);color:#fff;border-color:var(--primary)" onclick="document.getElementById('csvFile').click()">CSVファイルを選択</button>
    <input type="file" id="csvFile" accept=".csv" style="display:none">
    <div id="csvPreview" style="margin-top:12px"></div>
  </div>
  <div class="card">
    <h3>データ管理</h3>
    <button class="btn-export" onclick="exportData()">JSONエクスポート</button>
    <button class="btn-export" style="margin-top:8px" onclick="importData()">JSONインポート</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <button class="btn-export" style="margin-top:8px;border-color:var(--red);color:var(--red)" onclick="clearAllData()">全データ削除</button>
  </div>
</div>

<!-- タブバー -->
<div class="tab-bar">
  <button class="active" onclick="showPage('Home',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    ホーム
  </button>
  <button onclick="showPage('Input',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
    入力
  </button>
  <button onclick="showPage('History',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
    履歴
  </button>
  <button onclick="showPage('Fixed',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    固定費
  </button>
  <button onclick="showPage('Settings',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    設定
  </button>
</div>

<!-- 固定費モーダル -->
<div class="modal-overlay" id="fixedModal">
  <div class="modal">
    <h3 id="fixedModalTitle">固定費を追加</h3>
    <div class="form-group"><label>名前</label><input type="text" id="fixedName" placeholder="家賃"></div>
    <div class="form-group"><label>金額</label><input type="number" id="fixedAmount" placeholder="0" inputmode="numeric"></div>
    <div class="form-group">
      <label>カテゴリ</label>
      <select id="fixedCategory">
        <option value="家賃">家賃</option><option value="保険">保険</option>
        <option value="サブスク">サブスク</option><option value="光熱費">光熱費</option>
        <option value="通信費">通信費</option><option value="その他">その他</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeFixedModal()">キャンセル</button>
      <button class="btn-delete" id="btnFixedDelete" style="display:none" onclick="deleteFixed()">削除</button>
      <button class="btn-save" onclick="saveFixed()">保存</button>
    </div>
  </div>
</div>

<!-- 貯蓄目標モーダル -->
<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <h3>貯蓄目標</h3>
    <div class="form-group"><label>目標名</label><input type="text" id="goalName" placeholder="旅行資金"></div>
    <div class="form-group"><label>目標額</label><input type="number" id="goalTarget" placeholder="0" inputmode="numeric"></div>
    <div class="form-group"><label>現在の貯蓄額</label><input type="number" id="goalCurrent" placeholder="0" inputmode="numeric"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeGoalModal()">キャンセル</button>
      <button class="btn-delete" id="btnGoalDelete" style="display:none" onclick="deleteGoal()">削除</button>
      <button class="btn-save" onclick="saveGoal()">保存</button>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>取引を編集</h3>
    <div class="form-group">
      <label>種類</label>
      <div class="type-toggle">
        <button id="editBtnExpense" onclick="setEditType('expense')">支出</button>
        <button id="editBtnIncome" onclick="setEditType('income')">収入</button>
      </div>
    </div>
    <div class="form-group"><label>金額</label><input type="number" id="editAmount" inputmode="numeric"></div>
    <div class="form-group"><label>カテゴリ</label><select id="editCategory"></select></div>
    <div class="form-group"><label>日付</label><input type="date" id="editDate"></div>
    <div class="form-group"><label>メモ</label><textarea id="editMemo"></textarea></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
      <button class="btn-delete" onclick="deleteEntry()">削除</button>
      <button class="btn-save" onclick="updateEntry()">更新</button>
    </div>
  </div>
</div>

<script>
const EXPENSE_CATS = ['食費','日用品','交通費','趣味・機材','副業経費','固定費','その他'];
const INCOME_CATS = ['給与','副業','その他'];
const CAT_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f43f5e'];

const SEED_DATA = {
  entries: [
    { id: 's01', type: 'income', amount: 264421, category: '給与', date: '2026-01-20', memo: '1月給与' },
    { id: 's02', type: 'income', amount: 159, category: 'その他', date: '2026-01-15', memo: 'その他収入' },
    { id: 's03', type: 'expense', amount: 436843, category: 'その他', date: '2026-01-31', memo: '1月支出合計' },
    { id: 's04', type: 'income', amount: 298240, category: '給与', date: '2026-02-20', memo: '2月給与' },
    { id: 's05', type: 'income', amount: 276, category: 'その他', date: '2026-02-15', memo: 'その他収入' },
    { id: 's06', type: 'expense', amount: 386695, category: 'その他', date: '2026-02-28', memo: '2月支出合計' },
    { id: 's07', type: 'income', amount: 278035, category: '給与', date: '2026-03-20', memo: '3月給与' },
    { id: 's08', type: 'income', amount: 110079, category: '副業', date: '2026-03-15', memo: '3月その他収入' },
    { id: 's09', type: 'expense', amount: 387283, category: 'その他', date: '2026-03-31', memo: '3月支出合計' },
    { id: 's10', type: 'income', amount: 245688, category: '給与', date: '2026-04-20', memo: '4月給与' },
    { id: 's11', type: 'income', amount: 201743, category: '副業', date: '2026-04-15', memo: '4月その他収入' },
    { id: 's12', type: 'expense', amount: 429509, category: 'その他', date: '2026-04-30', memo: '4月支出合計' },
    { id: 's13', type: 'income', amount: 239105, category: '給与', date: '2026-05-20', memo: '5月給与' },
    { id: 's14', type: 'income', amount: 11243, category: 'その他', date: '2026-05-15', memo: '5月その他収入' },
    { id: 's15', type: 'expense', amount: 280863, category: 'その他', date: '2026-05-31', memo: '5月支出合計' },
    { id: 's16', type: 'income', amount: 236373, category: '給与', date: '2026-06-20', memo: '6月給与' },
    { id: 's17', type: 'income', amount: 10048, category: 'その他', date: '2026-06-15', memo: '6月その他収入' },
    { id: 's18', type: 'expense', amount: 184507, category: 'その他', date: '2026-06-29', memo: '6月支出合計' },
  ],
  fixedCosts: [],
  goals: []
};

function loadOrSeed(key, seedKey) {
  const stored = localStorage.getItem('kakeibo_' + key);
  if (stored) return JSON.parse(stored);
  const data = SEED_DATA[seedKey];
  localStorage.setItem('kakeibo_' + key, JSON.stringify(data));
  return data;
}

// 2025年12月末残高を初期値としてセット（未設定時のみ）
if (!localStorage.getItem('kakeibo_initial_balance')) {
  localStorage.setItem('kakeibo_initial_balance', '436128');
}

let entries = loadOrSeed('entries', 'entries');
let fixedCosts = loadOrSeed('fixed', 'fixedCosts');
let goals = loadOrSeed('goals', 'goals');
let currentType = 'expense';
let editType = 'expense';
let editingId = null;
let editingFixedIdx = -1;
let editingGoalIdx = -1;
let filterCat = 'all';

const now = new Date();
let viewYear = now.getFullYear();
let viewMonth = now.getMonth();

function save() {
  localStorage.setItem('kakeibo_entries', JSON.stringify(entries));
  localStorage.setItem('kakeibo_fixed', JSON.stringify(fixedCosts));
  localStorage.setItem('kakeibo_goals', JSON.stringify(goals));
}

function fmt(n) { return '¥' + Number(n).toLocaleString(); }

function monthEntries() {
  return entries.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });
}

function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = `${viewYear}年${viewMonth + 1}月`;
}

document.getElementById('prevMonth').onclick = () => { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } refresh(); };
document.getElementById('nextMonth').onclick = () => { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } refresh(); };

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + name).classList.add('active');
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'Home') renderHome();
  if (name === 'History') renderHistory();
  if (name === 'Fixed') renderFixed();
  if (name === 'Input') resetInputForm();
  if (name === 'Settings') {
    const v = localStorage.getItem('kakeibo_initial_balance');
    if (v) document.getElementById('initialBalance').value = v;
  }
}

function saveInitialBalance() {
  const val = parseInt(document.getElementById('initialBalance').value) || 0;
  localStorage.setItem('kakeibo_initial_balance', val);
  alert('初期残高を保存しました');
  renderHome();
}

function calcCumulative(untilYear, untilMonth) {
  const initialBalance = parseInt(localStorage.getItem('kakeibo_initial_balance') || '0');
  let total = initialBalance;
  entries.forEach(e => {
    const d = new Date(e.date);
    const y = d.getFullYear(), m = d.getMonth();
    if (y < untilYear || (y === untilYear && m <= untilMonth)) {
      total += e.type === 'income' ? e.amount : -e.amount;
    }
  });
  // 固定費は表示月分だけ引く（毎月同額と仮定）
  const months = (untilYear - 2026) * 12 + untilMonth + 1;
  total -= fixedCosts.reduce((s, f) => s + f.amount, 0) * months;
  return total;
}

function renderHome() {
  updateMonthLabel();
  const me = monthEntries();
  const income = me.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const expense = me.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
  const fixedTotal = fixedCosts.reduce((s, f) => s + f.amount, 0);
  const totalExp = expense + fixedTotal;

  document.getElementById('totalIncome').textContent = fmt(income);
  document.getElementById('totalExpense').textContent = fmt(totalExp);
  const bal = income - totalExp;
  const balEl = document.getElementById('totalBalance');
  balEl.textContent = fmt(bal);
  balEl.style.color = bal >= 0 ? 'var(--green)' : 'var(--red)';

  const cumulative = calcCumulative(viewYear, viewMonth);
  const cumEl = document.getElementById('totalCumulative');
  cumEl.textContent = fmt(cumulative);
  cumEl.style.color = cumulative >= 0 ? 'var(--green)' : 'var(--red)';

  const byCat = {};
  me.filter(e => e.type === 'expense').forEach(e => { byCat[e.category] = (byCat[e.category] || 0) + e.amount; });
  fixedCosts.forEach(f => { byCat[f.category] = (byCat[f.category] || 0) + f.amount; });

  const cats = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
  const bar = document.getElementById('categoryBar');
  const list = document.getElementById('categoryList');

  if (totalExp === 0) {
    bar.innerHTML = '<div style="width:100%;background:var(--border)"></div>';
    list.innerHTML = '<div class="empty">データなし</div>';
  } else {
    bar.innerHTML = cats.map((c, i) => `<div style="width:${c[1]/totalExp*100}%;background:${CAT_COLORS[i % CAT_COLORS.length]}"></div>`).join('');
    list.innerHTML = cats.map((c, i) => `<div class="category-row"><span><span class="category-dot" style="background:${CAT_COLORS[i % CAT_COLORS.length]}"></span>${c[0]}</span><span>${fmt(c[1])}</span></div>`).join('');
  }

  const recent = [...me].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
  document.getElementById('recentList').innerHTML = recent.length === 0
    ? '<div class="empty">取引なし</div>'
    : recent.map(e => `<div class="history-item"><div class="history-left"><span class="history-cat">${e.category}</span><span class="history-memo">${e.memo || ''}</span><span class="history-date">${e.date}</span></div><span class="history-amount ${e.type}">${e.type === 'expense' ? '-' : '+'}${fmt(e.amount)}</span></div>`).join('');
}

function setType(t) {
  currentType = t;
  document.getElementById('btnExpense').className = t === 'expense' ? 'active-expense' : '';
  document.getElementById('btnIncome').className = t === 'income' ? 'active-income' : '';
  renderCategoryChips();
}

function renderCategoryChips() {
  const cats = currentType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  document.getElementById('categoryChips').innerHTML = cats.map(c => `<button onclick="selectCat(this,'${c}')">${c}</button>`).join('');
}

let selectedCat = '';
function selectCat(btn, cat) {
  document.querySelectorAll('#categoryChips button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = cat;
}

function resetInputForm() {
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputMemo').value = '';
  document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10);
  selectedCat = '';
  setType('expense');
}

function saveEntry() {
  const amount = parseInt(document.getElementById('inputAmount').value);
  if (!amount || amount <= 0) return alert('金額を入力してください');
  if (!selectedCat) return alert('カテゴリを選択してください');
  entries.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    type: currentType,
    amount,
    category: selectedCat,
    date: document.getElementById('inputDate').value,
    memo: document.getElementById('inputMemo').value
  });
  save();
  resetInputForm();
  alert('保存しました');
}

function renderHistory() {
  updateMonthLabel();
  const me = monthEntries();
  const allCats = [...new Set(me.map(e => e.category))];
  const filterRow = document.getElementById('filterRow');
  filterRow.innerHTML = `<button class="${filterCat === 'all' ? 'selected' : ''}" onclick="setFilter('all')">すべて</button>` +
    allCats.map(c => `<button class="${filterCat === c ? 'selected' : ''}" onclick="setFilter('${c}')">${c}</button>`).join('');

  let filtered = filterCat === 'all' ? me : me.filter(e => e.category === filterCat);
  filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

  document.getElementById('historyList').innerHTML = filtered.length === 0
    ? '<div class="empty">取引なし</div>'
    : filtered.map(e => `<div class="history-item"><div class="history-left"><span class="history-cat">${e.category}</span><span class="history-memo">${e.memo || ''}</span><span class="history-date">${e.date}</span></div><div style="display:flex;align-items:center"><span class="history-amount ${e.type}">${e.type === 'expense' ? '-' : '+'}${fmt(e.amount)}</span><div class="history-actions"><button onclick="openEditModal('${e.id}')">✏️</button></div></div></div>`).join('');
}

function setFilter(cat) { filterCat = cat; renderHistory(); }

function openEditModal(id) {
  editingId = id;
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editType = e.type;
  document.getElementById('editBtnExpense').className = e.type === 'expense' ? 'active-expense' : '';
  document.getElementById('editBtnIncome').className = e.type === 'income' ? 'active-income' : '';
  const cats = e.type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  document.getElementById('editCategory').innerHTML = cats.map(c => `<option ${c === e.category ? 'selected' : ''}>${c}</option>`).join('');
  document.getElementById('editAmount').value = e.amount;
  document.getElementById('editDate').value = e.date;
  document.getElementById('editMemo').value = e.memo || '';
  document.getElementById('editModal').classList.add('show');
}

function setEditType(t) {
  editType = t;
  document.getElementById('editBtnExpense').className = t === 'expense' ? 'active-expense' : '';
  document.getElementById('editBtnIncome').className = t === 'income' ? 'active-income' : '';
  const cats = t === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  document.getElementById('editCategory').innerHTML = cats.map(c => `<option>${c}</option>`).join('');
}

function closeEditModal() { document.getElementById('editModal').classList.remove('show'); editingId = null; }

function updateEntry() {
  const idx = entries.findIndex(e => e.id === editingId);
  if (idx === -1) return;
  entries[idx] = {
    ...entries[idx],
    type: editType,
    amount: parseInt(document.getElementById('editAmount').value),
    category: document.getElementById('editCategory').value,
    date: document.getElementById('editDate').value,
    memo: document.getElementById('editMemo').value
  };
  save(); closeEditModal(); renderHistory();
}

function deleteEntry() {
  if (!confirm('削除しますか？')) return;
  entries = entries.filter(e => e.id !== editingId);
  save(); closeEditModal(); renderHistory();
}

function renderFixed() {
  const list = document.getElementById('fixedList');
  const total = fixedCosts.reduce((s, f) => s + f.amount, 0);
  list.innerHTML = fixedCosts.length === 0
    ? '<div class="empty">固定費未登録</div>'
    : fixedCosts.map((f, i) => `<div class="fixed-item"><div><div style="font-weight:600">${f.name}</div><div style="font-size:12px;color:var(--text-sub)">${f.category}</div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700">${fmt(f.amount)}</span><button style="background:none;border:none;cursor:pointer" onclick="openFixedModal(${i})">✏️</button></div></div>`).join('') +
      `<div class="fixed-item" style="border:none;font-weight:700"><span>合計</span><span>${fmt(total)}</span></div>`;

  const gs = document.getElementById('goalSection');
  gs.innerHTML = goals.length === 0
    ? '<div class="empty">目標未設定</div>'
    : goals.map((g, i) => {
      const pct = g.target > 0 ? Math.min(100, g.current / g.target * 100) : 0;
      return `<div style="padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openGoalModal(${i})"><div style="font-weight:600">${g.name}</div><div class="goal-progress"><div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%"></div></div><div class="goal-text"><span>${fmt(g.current)} / ${fmt(g.target)}</span><span>${pct.toFixed(0)}%</span></div></div></div>`;
    }).join('');
}

function openFixedModal(idx) {
  editingFixedIdx = idx !== undefined ? idx : -1;
  const f = idx !== undefined ? fixedCosts[idx] : null;
  document.getElementById('fixedModalTitle').textContent = f ? '固定費を編集' : '固定費を追加';
  document.getElementById('fixedName').value = f ? f.name : '';
  document.getElementById('fixedAmount').value = f ? f.amount : '';
  document.getElementById('fixedCategory').value = f ? f.category : '家賃';
  document.getElementById('btnFixedDelete').style.display = f ? 'block' : 'none';
  document.getElementById('fixedModal').classList.add('show');
}

function closeFixedModal() { document.getElementById('fixedModal').classList.remove('show'); }

function saveFixed() {
  const name = document.getElementById('fixedName').value.trim();
  const amount = parseInt(document.getElementById('fixedAmount').value);
  const category = document.getElementById('fixedCategory').value;
  if (!name || !amount) return alert('名前と金額を入力してください');
  if (editingFixedIdx >= 0) fixedCosts[editingFixedIdx] = { name, amount, category };
  else fixedCosts.push({ name, amount, category });
  save(); closeFixedModal(); renderFixed();
}

function deleteFixed() {
  if (!confirm('削除しますか？')) return;
  fixedCosts.splice(editingFixedIdx, 1);
  save(); closeFixedModal(); renderFixed();
}

function openGoalModal(idx) {
  editingGoalIdx = idx !== undefined ? idx : -1;
  const g = idx !== undefined ? goals[idx] : null;
  document.getElementById('goalName').value = g ? g.name : '';
  document.getElementById('goalTarget').value = g ? g.target : '';
  document.getElementById('goalCurrent').value = g ? g.current : '';
  document.getElementById('btnGoalDelete').style.display = g ? 'block' : 'none';
  document.getElementById('goalModal').classList.add('show');
}

function closeGoalModal() { document.getElementById('goalModal').classList.remove('show'); }

function saveGoal() {
  const name = document.getElementById('goalName').value.trim();
  const target = parseInt(document.getElementById('goalTarget').value);
  const current = parseInt(document.getElementById('goalCurrent').value) || 0;
  if (!name || !target) return alert('目標名と目標額を入力してください');
  if (editingGoalIdx >= 0) goals[editingGoalIdx] = { name, target, current };
  else goals.push({ name, target, current });
  save(); closeGoalModal(); renderFixed();
}

function deleteGoal() {
  if (!confirm('削除しますか？')) return;
  goals.splice(editingGoalIdx, 1);
  save(); closeGoalModal(); renderFixed();
}

function exportData() {
  const data = JSON.stringify({ entries, fixedCosts, goals }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kakeibo_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData() { document.getElementById('importFile').click(); }
document.getElementById('importFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.entries) entries = data.entries;
      if (data.fixedCosts) fixedCosts = data.fixedCosts;
      if (data.goals) goals = data.goals;
      save(); refresh(); alert('インポートしました');
    } catch { alert('無効なファイルです'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function clearAllData() {
  if (!confirm('全データを削除しますか？この操作は元に戻せません。')) return;
  entries = []; fixedCosts = []; goals = [];
  save(); refresh();
}

const CAT_RULES = [
  { pattern: /給料|給与/, category: '給与', type: 'income' },
  { pattern: /賞与|ボーナス/, category: '給与', type: 'income' },
  { pattern: /利息/, category: 'その他', type: 'income' },
  { pattern: /セブン|ファミ|ローソン|コンビニ|マツモトキヨシ|ドラッグ|スギ薬局/, category: '日用品', type: 'expense' },
  { pattern: /スーパー|イオン|マルエツ|ライフ|ヨーカドー|食品/, category: '食費', type: 'expense' },
  { pattern: /ＪＲ|ＳＵＩ|スイカ|パスモ|PASMO|鉄道|バス/, category: '交通費', type: 'expense' },
  { pattern: /ニコス|クレジット|カ[ーｰ]ド/, category: '固定費', type: 'expense' },
  { pattern: /ドスパラ|アマゾン|AMAZON|ヨドバシ|ビック/, category: '趣味・機材', type: 'expense' },
  { pattern: /ネツトフリコミ|振込/, category: '固定費', type: 'expense' },
  { pattern: /ペイペイ|PayPay/, category: 'その他', type: 'expense' },
  { pattern: /グ[ーｰ]グル/, category: 'サブスク', type: 'expense' },
  { pattern: /ニコニコ|フアンテイア|ヴアロラント/, category: '趣味・機材', type: 'expense' },
  { pattern: /ダイソ[ーｰ]/, category: '日用品', type: 'expense' },
];

function classifyTransaction(summary, detail) {
  const text = (summary || '') + (detail || '');
  for (const rule of CAT_RULES) {
    if (rule.pattern.test(text)) return { category: rule.category, type: rule.type };
  }
  return null;
}

function parseUFJcsv(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const results = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = [];
    let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    cols.push(cur.trim());
    if (cols.length < 6) continue;
    const [dateStr, summary, detail, payment, deposit] = cols;
    const amount = parseInt((payment || deposit || '0').replace(/,/g, ''));
    if (!amount || !dateStr) continue;
    const parts = dateStr.split('/');
    const date = `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
    const isIncome = !payment && !!deposit;
    const classified = classifyTransaction(summary, detail);
    results.push({
      id: 'csv' + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      type: classified ? classified.type : (isIncome ? 'income' : 'expense'),
      amount,
      category: classified ? classified.category : (isIncome ? 'その他' : 'その他'),
      date,
      memo: detail || summary || ''
    });
  }
  return results;
}

document.getElementById('csvFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    let text;
    try {
      const decoder = new TextDecoder('shift-jis');
      text = decoder.decode(ev.target.result);
    } catch {
      text = new TextDecoder('utf-8').decode(ev.target.result);
    }
    const parsed = parseUFJcsv(text);
    if (parsed.length === 0) { alert('取引データが見つかりませんでした'); return; }
    const income = parsed.filter(e => e.type === 'income');
    const expense = parsed.filter(e => e.type === 'expense');
    const preview = document.getElementById('csvPreview');
    preview.innerHTML = `
      <div class="card" style="background:#f0fdf4;margin:0">
        <div style="font-weight:700;margin-bottom:8px">${parsed.length}件の取引を検出</div>
        <div style="font-size:13px;color:var(--text-sub)">
          収入: ${income.length}件（${fmt(income.reduce((s,e)=>s+e.amount,0))}）<br>
          支出: ${expense.length}件（${fmt(expense.reduce((s,e)=>s+e.amount,0))}）
        </div>
        <div style="margin-top:12px;max-height:200px;overflow-y:auto;font-size:12px">
          ${parsed.slice(0,10).map(e => `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span>${e.date} ${e.memo.slice(0,15)}</span><span style="color:${e.type==='income'?'var(--green)':'var(--red)'}">${e.type==='expense'?'-':'+'} ${fmt(e.amount)}</span></div>`).join('')}
          ${parsed.length > 10 ? '<div style="text-align:center;padding:4px;color:var(--text-sub)">...他 '+(parsed.length-10)+'件</div>' : ''}
        </div>
        <button class="btn-submit" style="margin-top:12px" onclick="confirmCsvImport()">取り込む</button>
      </div>`;
    window._csvParsed = parsed;
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
});

function confirmCsvImport() {
  if (!window._csvParsed) return;
  const existing = new Set(entries.map(e => e.date + e.amount + e.memo));
  const newEntries = window._csvParsed.filter(e => !existing.has(e.date + e.amount + e.memo));
  entries.push(...newEntries);
  save();
  document.getElementById('csvPreview').innerHTML = `<div style="color:var(--green);font-weight:600;padding:8px">${newEntries.length}件を取り込みました（重複${window._csvParsed.length - newEntries.length}件スキップ）</div>`;
  window._csvParsed = null;
  refresh();
}

function refresh() { renderHome(); }

resetInputForm();
renderHome();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
